
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

sqlite: &sqlite
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: thesis_development
  queue:
    <<: *sqlite
    database: storage/thesis_development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *sqlite
    database: storage/thesis_development_cable.sqlite3
    migrations_paths: db/cable_migrate
  cache:
    <<: *sqlite
    database: storage/thesis_development_cache.sqlite3
    migrations_paths: db/cache_migrate

test:
  <<: *default
  database: thesis_test



production:
  primary: &primary_production
    <<: *default
    database: thesis_production
    url: <%= Rails.application.credentials.db_url %>
  cache:
    <<: *sqlite
    database: storage/thesis_production_cache.sqlite3
    migrations_paths: db/cache_migrate
  cable:
    <<: *sqlite
    database: storage/thesis_production_cable.sqlite3
    migrations_paths: db/cable_migrate
  queue:
    <<: *sqlite
    database: storage/thesis_production_queue.sqlite3
    migrations_paths: db/queue_migrate